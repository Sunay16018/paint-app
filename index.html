<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Paint Pro">
    <meta name="description" content="Profesyonel mobil ve masaüstü çizim uygulaması">
    <meta name="mobile-web-app-capable" content="yes">

    <title>Paint Pro</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-192.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-192.png">
    <link rel="shortcut icon" href="icons/icon-192.png">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Install Banner (PWA) -->
    <div class="install-banner" id="installBanner">
        <span>📲 Ana ekrana ekle!</span>
        <button id="installBtn" class="install-accept">Ekle</button>
        <button id="installDismiss" class="install-dismiss">✕</button>
    </div>

    <div class="app" id="app">
        <!-- HEADER -->
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                        <circle cx="14" cy="14" r="14" fill="url(#grad)"/>
                        <path d="M8 20 L12 10 L14 16 L16 12 L20 20" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <defs>
                            <linearGradient id="grad" x1="0" y1="0" x2="28" y2="28">
                                <stop offset="0%" stop-color="#34d399"/>
                                <stop offset="100%" stop-color="#60a5fa"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1 class="app-title">Paint Pro</h1>
            </div>
            <div class="header-right">
                <button id="downloadBtn" class="icon-btn" title="İndir (PNG)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                </button>
                <div class="menu-container">
                    <button id="menuBtn" class="icon-btn" title="Menü">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                            <line x1="3" y1="6" x2="21" y2="6"/>
                            <line x1="3" y1="12" x2="21" y2="12"/>
                            <line x1="3" y1="18" x2="21" y2="18"/>
                        </svg>
                    </button>
                    <div class="menu-dropdown" id="menuDropdown">
                        <button id="newDrawingBtn" class="menu-item">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
                            Yeni Çizim
                        </button>
                        <button id="loadImageBtn" class="menu-item">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>
                            Resim Yükle
                        </button>
                        <button id="savedDrawingsBtn" class="menu-item">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                            Kayıtlı Çizimler
                        </button>
                        <div class="menu-divider"></div>
                        <button id="downloadPngBtn" class="menu-item">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            PNG İndir
                        </button>
                        <button id="downloadJpgBtn" class="menu-item">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            JPG İndir
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- CANVAS AREA -->
        <div class="canvas-area">
            <!-- Quick actions: undo/redo/symmetry/grid -->
            <div class="canvas-toolbar">
                <div class="toolbar-group">
                    <button id="undoBtn" class="toolbar-btn" title="Geri Al (Ctrl+Z)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
                        <span>Geri</span>
                    </button>
                    <button id="redoBtn" class="toolbar-btn" title="İleri Al (Ctrl+Y)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg>
                        <span>İleri</span>
                    </button>
                </div>
                <div class="toolbar-group">
                    <button id="symmetryBtn" class="toolbar-btn" title="Simetri">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="3" x2="12" y2="21"/><path d="M6 7l-3 5 3 5M18 7l3 5-3 5"/></svg>
                        <span>Simetri</span>
                    </button>
                    <button id="gridBtn" class="toolbar-btn" title="Izgara">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
                        <span>Izgara</span>
                    </button>
                    <button id="zoomInBtn" class="toolbar-btn" title="Yakınlaştır">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                        <span>+</span>
                    </button>
                    <button id="zoomOutBtn" class="toolbar-btn" title="Uzaklaştır">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                        <span>−</span>
                    </button>
                </div>
                <div class="zoom-indicator" id="zoomIndicator">100%</div>
            </div>

            <div class="canvas-wrapper" id="canvasWrapper">
                <canvas id="canvas"></canvas>
                <canvas id="overlayCanvas"></canvas>
            </div>
        </div>

        <!-- TOOLS SIDEBAR (desktop) / BOTTOM SHEET (mobile) -->
        <div class="tools-panel">
            <!-- TOOL BUTTONS -->
            <div class="tools-grid">
                <button id="pencilBtn" class="tool active" data-tool="pencil" title="Kalem (P)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
                    <span>Kalem</span>
                </button>
                <button id="brushBtn" class="tool" data-tool="brush" title="Fırça (B)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9.06 11.9 8.07-8.06a2.85 2.83 0 1 1 4.03 4.03l-8.06 8.08"/><path d="M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1.08 1.1 2.49 2.02 4 2.02 2.2 0 4-1.8 4-4.04a3.01 3.01 0 0 0-3-3.02z"/></svg>
                    <span>Fırça</span>
                </button>
                <button id="eraserBtn" class="tool" data-tool="eraser" title="Silgi (E)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
                    <span>Silgi</span>
                </button>
                <button id="fillBtn" class="tool" data-tool="fill" title="Boya Kovası (F)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 11-8-8-8.5 8.5a5.5 5.5 0 0 0 7.78 7.78L19 11Z"/><path d="m5 2 5 5"/><path d="M2 13h15"/><path d="M22 20a2 2 0 1 1-4 0c0-1.6 1.7-2.4 2-4 .3 1.6 2 2.4 2 4Z"/></svg>
                    <span>Boya</span>
                </button>
                <button id="sprayBtn" class="tool" data-tool="spray" title="Sprey (S)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h.01M7 5h.01M11 4h.01M5 9h.01M9 7.5h.01M14 3h.01"/><path d="M4.9 9.1 2 12l8 8 8-8-3-3"/><path d="m12 12 3-3"/></svg>
                    <span>Sprey</span>
                </button>
                <button id="lineBtn" class="tool" data-tool="line" title="Çizgi (L)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="19" x2="19" y2="5"/></svg>
                    <span>Çizgi</span>
                </button>
                <button id="rectBtn" class="tool" data-tool="rect" title="Dikdörtgen (R)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                    <span>Dikdörtgen</span>
                </button>
                <button id="circleBtn" class="tool" data-tool="circle" title="Daire (C)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/></svg>
                    <span>Daire</span>
                </button>
                <button id="eyedropperBtn" class="tool" data-tool="eyedropper" title="Renk Seçici (I)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 22 7 17"/><path d="m13.4 5.6-2.8 2.8-1.6-1.6-3.6 3.6 5.6 5.6 3.6-3.6-1.6-1.6 2.8-2.8-2.4-2.4Z"/><path d="m9 9 6 6"/><path d="M20.7 5.7a2.121 2.121 0 0 0-3-3l-3.4 3.4 3 3 3.4-3.4Z"/></svg>
                    <span>Seçici</span>
                </button>
                <button id="clearBtn" class="tool tool-danger" data-tool="clear" title="Temizle">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6 18.1 20a2 2 0 0 1-2 1.9H7.9a2 2 0 0 1-2-1.9L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                    <span>Temizle</span>
                </button>
            </div>

            <!-- COLOR PALETTE -->
            <div class="palette-section">
                <div class="palette-header">
                    <span class="section-label">Renk</span>
                    <div class="current-color-wrapper">
                        <div class="current-color" id="currentColorDisplay"></div>
                        <input type="color" id="colorPicker" value="#000000" title="Özel renk seç">
                    </div>
                </div>
                <div class="colors" id="colors"></div>
            </div>

            <!-- BRUSH SIZE -->
            <div class="size-section">
                <div class="size-header">
                    <span class="section-label">Boyut</span>
                    <span class="size-value-display" id="sizeValue">5px</span>
                </div>
                <div class="size-presets">
                    <button class="size-preset" data-size="2">S</button>
                    <button class="size-preset active" data-size="5">M</button>
                    <button class="size-preset" data-size="12">L</button>
                    <button class="size-preset" data-size="25">XL</button>
                </div>
                <input type="range" id="brushSize" min="1" max="100" value="5" class="size-slider">
            </div>

            <!-- OPACITY -->
            <div class="opacity-section">
                <div class="size-header">
                    <span class="section-label">Opaklık</span>
                    <span class="size-value-display" id="opacityValue">100%</span>
                </div>
                <input type="range" id="opacitySlider" min="1" max="100" value="100" class="size-slider opacity-slider">
            </div>

            <!-- SAVE -->
            <div class="save-section">
                <input type="text" id="drawingName" class="name-input" placeholder="Çizim adı...">
                <button id="saveBtn" class="save-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    Kaydet
                </button>
            </div>
        </div>
    </div>

    <!-- Hidden inputs -->
    <input type="file" id="imageUpload" accept="image/*" style="display:none">

    <!-- DRAWINGS MODAL -->
    <div class="modal" id="drawingsModal" role="dialog" aria-label="Kayıtlı Çizimler">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Çizimlerim</h2>
                <button class="close-btn" id="closeDrawingsBtn" aria-label="Kapat">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="drawings-list" id="drawingsList"></div>
        </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div class="toast" id="toast"></div>

    <!-- Scripts -->
    <script src="js/paint.js"></script>
    <script src="js/sw-register.js"></script>
</body>
</html>
